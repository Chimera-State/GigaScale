services:

  # ── Backend (gRPC) ──────────────────────────────────────────────────────────
  # Sadece internal ağda — dışarıya hiçbir port açılmaz (zero-trust)
  backend:
    image: gigascale/backend:70.5.4
    build:
      context: .
      dockerfile: cmd/backend/Dockerfile
    container_name: gigascale-backend
    restart: unless-stopped
    networks:
      - internal
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:50051" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          memory: 256M

  # ── Gateway (HTTP → gRPC) ───────────────────────────────────────────────────

  gateway:

    build:
      # Gateway için   
      context: .
      dockerfile: cmd/gateway/Dockerfile
    image: gigascale/gateway:70.5.4
    container_name: gigascale-gateway
    restart: unless-stopped
    ports:
      - "8080"
    environment:
      - BACKEND_ADDR=backend:50051
      - REDIS_ADDR=redis:6379
    networks:
      - internal
    depends_on:
      - backend
      - redis
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 128M

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: gigascale-redis
    command: --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M

  k6:
    image: grafana/k6:latest
    container_name: gigascale-k6
    depends_on:
      - gateway
    networks:
      - internal
    volumes:

      - ./k6:/scripts
    working_dir: /scripts
    entrypoint: [ "k6" ]

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gigascale-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=gigascale
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gigascale" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M

  # ── Payment Service (gRPC) ────────────────────────────────────────────────
  payment:
    build:
      context: .
      dockerfile: cmd/payment/Dockerfile
    container_name: gigascale-payment
    restart: unless-stopped
    networks:
      - internal
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=gigascale
    depends_on:
      - postgres

    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:50052" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 128M

  caddy:
    image: caddy:latest
    container_name: gigascale-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - gateway







# -------------------------------------
networks:
  internal:
    name: gigascale-internal
    driver: bridge

volumes:
  pg-data:
  redis-data: # Redis verilerini kalıcı tutmak için
  caddy_data:
  caddy_config:
