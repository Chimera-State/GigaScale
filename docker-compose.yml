services:

  # ── Backend (gRPC) ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: cmd/backend/Dockerfile
    container_name: gigascale-backend
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully # Tablolar oluşmadan backend açılmaz

  # ── Database Migration ──────────────────────────────────────────────────────
  migration:
    image: migrate/migrate
    container_name: gigascale-migration
    networks:
      - internal
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path
      - migrations 
      - -database
      - postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy


  # ── Gateway (HTTP → gRPC) ───────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    container_name: gigascale-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      - backend

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gigascale-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s # Garanti olsun diye 15 saniyeye çıkardık


  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: gigascale-redis
    command: --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped

  # ── RedisInsight (Redis GUI) ──────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: gigascale-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - internal
    depends_on:
      - redis

  # ── Load Testing (k6) ─────────────────────────────────────────────────────────
  k6:
    image: grafana/k6:latest
    container_name: gigascale-k6
    depends_on:
      - gateway
    networks:
      - internal
    volumes:
      - ./k6:/scripts
    working_dir: /scripts
    entrypoint: [ "k6" ]

# ── Networks & Volumes ────────────────────────────────────────────────────────
networks:
  internal:
    name: gigascale-internal
    driver: bridge

volumes:
  redis-data:
  postgres-data:
