services:

  # ── Backend (gRPC) ──────────────────────────────────────────────────────────
  # Sadece internal ağda — dışarıya hiçbir port açılmaz (zero-trust)
  backend:
    build:
      context: . # Projenin kök dizini
      dockerfile: cmd/backend/Dockerfile # Projede DockerFile yolunu belirtiyoruz
    container_name: gigascale-backend # Container ismini belirtiyoruz
    restart: unless-stopped # Container durdurulursa otomatik başlat
    networks:
      - internal # ağ bağlanma kısmında dışarıya kapalı port açılmaz(zero trust)
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    
  migrate:
    image: migrate/migrate
    container_name: gigascale-migrate
    volumes:
      - ./migrations:/migrations
    networks:
      - internal
    command: ["-path", "file://migrations", "-database", "${DATABASE_URL}", "up"]
    depends_on:
      - postgres

migration:
    image: migrate/migrate
    container_name: gigascale-migration
    networks:
      - internal
    volumes:
      - ./migrations:/migrations
    command:
      - -path
      - /migrations
      - -database
      - postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  # ── Gateway (HTTP → gRPC) ───────────────────────────────────────────────────
  # Dışarıdan gelen HTTP isteklerini alır, internal ağda backend'e iletir
  gateway:
    build:
      # Gateway için   
      context: .
      dockerfile: cmd/gateway/Dockerfile
    container_name: gigascale-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      - backend # backend ayağa kalkmadan gateway ayağa kalkmasın

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gigascale-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: gigascale-redis
    command: --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped

  # ── RedisInsight (Redis GUI) ───────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: gigascale-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540" # Tarayıcıdan http://localhost:5540 ile erişilir
    networks:
      - internal # Redis ile aynı ağda olmalı ki bağlanabilsin
    depends_on:
      - redis # Redis ayağa kalkmadan RedisInsight başlamasın

  k6:
    image: grafana/k6:latest # tüm testleri burada çalıştıracağız
    container_name: gigascale-k6
    depends_on:
      - gateway
    networks:
      - internal
    volumes:
      # volumes, container'lar silinse bile verilerin kalmasını sağlar
      - ./k6:/scripts
    working_dir: /scripts
    entrypoint: [ "k6" ]

# -------------------------------------
networks:
  internal:
    name: gigascale-internal
    driver: bridge

volumes:
  redis-data: # Redis verilerini kalıcı tutmak için
  postgres-data: # Veritabanı verilerini kalıcı tutmak için

